<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotwire Flow — Minimal Example</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=x27http://www.w3.org/2000/svgx27 viewBox=x270 0 100 100x27%3E%3Crect width=x27100x27 height=x27100x27 fill=x27%233b82f6x27 rx=x2715x27/%3E%3Cpath d=x27M20 35 L40 35 L40 50 L60 50x27 stroke=x27whitex27 stroke-width=x276x27 stroke-linecap=x27roundx27 fill=x27nonex27/%3E%3Cpath d=x27M60 50 L80 50 L80 65x27 stroke=x27whitex27 stroke-width=x276x27 stroke-linecap=x27roundx27 fill=x27nonex27/%3E%3Ccircle cx=x2720x27 cy=x2735x27 r=x278x27 fill=x27whitex27/%3E%3Ccircle cx=x2760x27 cy=x2750x27 r=x278x27 fill=x27whitex27/%3E%3Ccircle cx=x2780x27 cy=x2765x27 r=x278x27 fill=x27whitex27/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../dist/hotwire-flow.css">
  <script type="importmap">
  { "imports": { "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/+esm" } }
  </script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .page-header { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: white; display: flex; align-items: center; padding: 0 16px; z-index: 200; border-bottom: 1px solid #e2e8f0; gap: 8px; }
    .page-header a { color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .page-header a:hover { color: #3b82f6; }
    .page-header a svg { width: 16px; height: 16px; }
    #app { width: 100vw; height: 100vh; padding-top: 44px; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="./">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Examples
    </a>
  </div>
  <div id="app">
    <div data-controller="flow" class="hf-canvas" id="canvas">
      <div data-controller="flow-background"
           data-flow-background-flow-outlet="#canvas"
           data-flow-background-variant-value="dots"
           class="absolute inset-0"></div>

      <div data-flow-target="pane" class="hf-pane">
        <!-- Connection line SVG -->
        <svg class="hf-edges" style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1">
          <path data-controller="flow-connection-line"
                class="hf-connection-line"
                style="display:none" />
        </svg>

        <div data-flow-target="nodes" class="hf-nodes">
          <!-- Node A -->
          <div data-controller="flow-node"
               data-flow-node-flow-outlet="#canvas"
               data-flow-node-id-value="n1"
               data-flow-node-type-value="input"
               data-flow-node-x-value="100"
               data-flow-node-y-value="200"
               class="hf-node hf-node--input"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div class="hf-node__header">Input</div>
            <div class="hf-node__body">Start here</div>
            <div data-controller="flow-handle"
                 data-flow-handle-flow-outlet="#canvas"
                 data-flow-handle-id-value="n1-r"
                 data-flow-handle-node-id-value="n1"
                 data-flow-handle-position-value="right"
                 class="hf-handle hf-handle--right"
                 data-action="pointerdown->flow-handle#pointerDown"></div>
          </div>

          <!-- Node B -->
          <div data-controller="flow-node"
               data-flow-node-flow-outlet="#canvas"
               data-flow-node-id-value="n2"
               data-flow-node-type-value="output"
               data-flow-node-x-value="500"
               data-flow-node-y-value="200"
               class="hf-node hf-node--output"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div data-controller="flow-handle"
                 data-flow-handle-flow-outlet="#canvas"
                 data-flow-handle-id-value="n2-l"
                 data-flow-handle-node-id-value="n2"
                 data-flow-handle-position-value="left"
                 class="hf-handle hf-handle--left"
                 data-action="pointerdown->flow-handle#pointerDown"></div>
            <div class="hf-node__header">Output</div>
            <div class="hf-node__body">End here</div>
          </div>

          <!-- Edges (inside nodes container SVG) -->
          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1">
            <path data-controller="flow-edge"
                  data-flow-edge-id-value="e1"
                  data-flow-edge-source-value="n1"
                  data-flow-edge-target-value="n2"
                  class="hf-edge" />
          </svg>
        </div>
      </div>

      <div data-flow-target="selectionBox" class="hf-selection-box"></div>

      <!-- Controls -->
      <div class="hf-controls" data-controller="flow-toolbar" data-flow-toolbar-flow-outlet="#canvas">
        <button data-action="click->flow-toolbar#zoomIn" class="hf-control-btn">+</button>
        <button data-flow-toolbar-target="zoomLevel" class="hf-control-btn">100%</button>
        <button data-action="click->flow-toolbar#zoomOut" class="hf-control-btn">−</button>
        <button data-action="click->flow-toolbar#fitView" class="hf-control-btn" title="Fit">⊡</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { Application } from "@hotwired/stimulus"
    import { registerHotwireFlow } from "../src/index.js?v=9"
    const app = Application.start()
    registerHotwireFlow(app)
  </script>
</body>
</html>
