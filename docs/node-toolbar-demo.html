<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Toolbar — Hotwire Flow</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=x27http://www.w3.org/2000/svgx27 viewBox=x270 0 100 100x27%3E%3Crect width=x27100x27 height=x27100x27 fill=x27%233b82f6x27 rx=x2715x27/%3E%3Cpath d=x27M20 35 L40 35 L40 50 L60 50x27 stroke=x27whitex27 stroke-width=x276x27 stroke-linecap=x27roundx27 fill=x27nonex27/%3E%3Cpath d=x27M60 50 L80 50 L80 65x27 stroke=x27whitex27 stroke-width=x276x27 stroke-linecap=x27roundx27 fill=x27nonex27/%3E%3Ccircle cx=x2720x27 cy=x2735x27 r=x278x27 fill=x27whitex27/%3E%3Ccircle cx=x2760x27 cy=x2750x27 r=x278x27 fill=x27whitex27/%3E%3Ccircle cx=x2780x27 cy=x2765x27 r=x278x27 fill=x27whitex27/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./dist/hotwire-flow.css">
  <script type="importmap">
  { "imports": { "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/+esm" } }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    .page-header { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: white; display: flex; align-items: center; padding: 0 16px; z-index: 200; border-bottom: 1px solid #e2e8f0; gap: 8px; }
    .page-header h1 { font-size: 14px; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 8px; }
    .page-header a { color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; margin-right: 16px; }
    .page-header a:hover { color: #3b82f6; }
    .flow-wrap { position: absolute; top: 44px; left: 0; right: 0; bottom: 0; }
    .toolbar-btn { padding: 4px 8px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: #64748b; border-radius: 4px; }
    .toolbar-btn:hover { background: #f1f5f9; color: #1e293b; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="./">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <h1>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Node Toolbar Demo
    </h1>
    <div style="flex:1"></div>
    <div style="font-size:12px;color:#64748b">Click a node to see its floating toolbar</div>
  </div>

  <div class="flow-wrap">
    <div data-controller="flow" data-flow-fit-view-on-init-value="false" class="hf-canvas" id="flow-canvas">
      <div data-controller="flow-background" data-flow-background-flow-outlet="#flow-canvas" data-flow-background-variant-value="dots" style="position:absolute;inset:0;"></div>

      <div data-flow-target="pane" class="hf-pane">
        <div data-flow-target="nodes" class="hf-nodes">
          <!-- Node with toolbar on top -->
          <div data-controller="flow-node" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n1" data-flow-node-type-value="input"
               data-flow-node-x-value="120" data-flow-node-y-value="180"
               class="hf-node hf-node--input"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div class="hf-node__header">Edit Node</div>
            <div class="hf-node__body">Click to see toolbar above</div>
            <div data-controller="flow-node-toolbar" data-flow-node-toolbar-position-value="top" data-flow-node-toolbar-offset-value="8">
              <button class="toolbar-btn" title="Edit">✏️</button>
              <button class="toolbar-btn" title="Copy">📋</button>
              <button class="toolbar-btn" title="Delete">🗑️</button>
            </div>
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n1-r" data-flow-handle-node-id-value="n1" data-flow-handle-position-value="right" class="hf-handle hf-handle--right" data-action="pointerdown->flow-handle#pointerDown"></div>
          </div>

          <!-- Node with toolbar on bottom -->
          <div data-controller="flow-node" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n2" data-flow-node-type-value="default"
               data-flow-node-x-value="480" data-flow-node-y-value="180"
               class="hf-node hf-node--default"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n2-l" data-flow-handle-node-id-value="n2" data-flow-handle-position-value="left" class="hf-handle hf-handle--left" data-action="pointerdown->flow-handle#pointerDown"></div>
            <div class="hf-node__header">Bottom Toolbar</div>
            <div class="hf-node__body">Toolbar appears below</div>
            <div data-controller="flow-node-toolbar" data-flow-node-toolbar-position-value="bottom" data-flow-node-toolbar-offset-value="8">
              <button class="toolbar-btn" title="Duplicate">📄</button>
              <button class="toolbar-btn" title="Settings">⚙️</button>
            </div>
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n2-r" data-flow-handle-node-id-value="n2" data-flow-handle-position-value="right" class="hf-handle hf-handle--right" data-action="pointerdown->flow-handle#pointerDown"></div>
          </div>

          <!-- Node without toolbar -->
          <div data-controller="flow-node" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n3" data-flow-node-type-value="output"
               data-flow-node-x-value="480" data-flow-node-y-value="360"
               class="hf-node hf-node--output"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n3-l" data-flow-handle-node-id-value="n3" data-flow-handle-position-value="left" class="hf-handle hf-handle--left" data-action="pointerdown->flow-handle#pointerDown"></div>
            <div class="hf-node__header">No Toolbar</div>
            <div class="hf-node__body">This node has no toolbar</div>
          </div>

          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1">
            <path data-controller="flow-edge" data-flow-edge-flow-outlet="#flow-canvas" data-flow-edge-id-value="e1" data-flow-edge-source-value="n1" data-flow-edge-source-handle-value="n1-r" data-flow-edge-target-value="n2" data-flow-edge-target-handle-value="n2-l" data-flow-edge-type-value="smoothstep" data-flow-edge-label-value="connects" data-flow-edge-marker-end-value="arrow" data-flow-edge-animated-value="true" class="hf-edge" />
            <path data-controller="flow-edge" data-flow-edge-flow-outlet="#flow-canvas" data-flow-edge-id-value="e2" data-flow-edge-source-value="n2" data-flow-edge-source-handle-value="n2-r" data-flow-edge-target-value="n3" data-flow-edge-target-handle-value="n3-l" data-flow-edge-type-value="smoothstep" data-flow-edge-label-value="output" data-flow-edge-marker-end-value="arrow" class="hf-edge" />
            <path data-controller="flow-connection-line" class="hf-connection-line" style="display:none" />
          </svg>
        </div>
      </div>

      <div data-flow-target="selectionBox" class="hf-selection-box"></div>

      <div class="hf-controls" data-controller="flow-toolbar" data-flow-toolbar-flow-outlet="#flow-canvas">
        <button data-action="click->flow-toolbar#zoomIn" class="hf-control-btn">+</button>
        <button data-flow-toolbar-target="zoomLevel" class="hf-control-btn hf-control-btn--zoom-level">100%</button>
        <button data-action="click->flow-toolbar#zoomOut" class="hf-control-btn">−</button>
        <button data-action="click->flow-toolbar#fitView" class="hf-control-btn">⊞</button>
      </div>
      <div data-controller="flow-minimap" data-flow-minimap-flow-outlet="#flow-canvas"></div>
    </div>
  </div>

  <script type="module">
    import { Application } from "@hotwired/stimulus"
    import { registerHotwireFlow } from "./src/index.js?v=9"
    const app = Application.start()
    registerHotwireFlow(app)
  </script>
</body>
</html>
