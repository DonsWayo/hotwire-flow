  <circle cx="60" cy="50" r="6" fill="#3b82f6" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="80" cy="65" r="6" fill="white" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Hotwire bolt - scaled and positioned -->
  <g transform="translate(35, 55) scale(0.25)">
    <path fill="#3b82f6" d="m211.75 23-11.57 2.69 10.09-25.69-30.2 38.92 14.41-2.84-13.59 26.54 7.86-1.77-7.95 18.95 24.97-26.97-9.21 2.13z"/>
