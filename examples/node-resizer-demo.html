<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Resizer — Hotwire Flow</title>
  <link rel="stylesheet" href="../dist/hotwire-flow.css">
  <script type="importmap">
  { "imports": { "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/+esm" } }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    .page-header { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #0f172a; display: flex; align-items: center; padding: 0 16px; z-index: 200; border-bottom: 1px solid #1e293b; gap: 8px; }
    .page-header h1 { font-size: 14px; font-weight: 600; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
    .flow-wrap { position: absolute; top: 44px; left: 0; right: 0; bottom: 0; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18M3 15h18"/></svg>
      Node Resizer Demo
    </h1>
    <div style="flex:1"></div>
    <div style="font-size:12px;color:#64748b">Drag node edges to resize · 8-handle resize</div>
  </div>

  <div class="flow-wrap">
    <div data-controller="flow" data-flow-fit-view-on-init-value="false" class="hf-canvas" id="flow-canvas">
      <div data-controller="flow-background" data-flow-background-flow-outlet="#flow-canvas" data-flow-background-variant-value="dots" style="position:absolute;inset:0;"></div>

      <div data-flow-target="pane" class="hf-pane">
        <div data-flow-target="nodes" class="hf-nodes">
          <!-- Resizable node 1 -->
          <div data-controller="flow-node flow-node-resizer" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n1" data-flow-node-type-value="default"
               data-flow-node-x-value="120" data-flow-node-y-value="120"
               style="width:200px;height:120px"
               class="hf-node"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div class="hf-node__header">Resizable</div>
            <div class="hf-node__body">Drag the corners or edges to resize this node</div>
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n1-r" data-flow-handle-node-id-value="n1" data-flow-handle-position-value="right" class="hf-handle hf-handle--right" data-action="pointerdown->flow-handle#pointerDown"></div>
          </div>

          <!-- Resizable node 2 -->
          <div data-controller="flow-node flow-node-resizer" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n2" data-flow-node-type-value="default"
               data-flow-node-x-value="480" data-flow-node-y-value="200"
               data-flow-node-resizer-min-width-value="100"
               data-flow-node-resizer-min-height-value="80"
               data-flow-node-resizer-max-width-value="400"
               data-flow-node-resizer-max-height-value="300"
               style="width:180px;height:100px"
               class="hf-node hf-node--output"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n2-l" data-flow-handle-node-id-value="n2" data-flow-handle-position-value="left" class="hf-handle hf-handle--left" data-action="pointerdown->flow-handle#pointerDown"></div>
            <div class="hf-node__header">Constrained</div>
            <div class="hf-node__body">Min 100×80, Max 400×300</div>
          </div>

          <!-- Fixed size node -->
          <div data-controller="flow-node" data-flow-node-flow-outlet="#flow-canvas"
               data-flow-node-id-value="n3" data-flow-node-type-value="input"
               data-flow-node-x-value="120" data-flow-node-y-value="350"
               class="hf-node hf-node--input"
               data-action="pointerdown->flow-node#pointerDown click->flow-node#click">
            <div class="hf-node__header">Fixed Size</div>
            <div class="hf-node__body">No resizer attached</div>
            <div data-controller="flow-handle" data-flow-handle-flow-outlet="#flow-canvas" data-flow-handle-id-value="n3-r" data-flow-handle-node-id-value="n3" data-flow-handle-position-value="right" class="hf-handle hf-handle--right" data-action="pointerdown->flow-handle#pointerDown"></div>
          </div>

          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1">
            <path data-controller="flow-edge" data-flow-edge-flow-outlet="#flow-canvas" data-flow-edge-id-value="e1" data-flow-edge-source-value="n1" data-flow-edge-source-handle-value="n1-r" data-flow-edge-target-value="n2" data-flow-edge-target-handle-value="n2-l" data-flow-edge-type-value="smoothstep" data-flow-edge-marker-end-value="arrow" class="hf-edge" />
            <path data-controller="flow-edge" data-flow-edge-flow-outlet="#flow-canvas" data-flow-edge-id-value="e2" data-flow-edge-source-value="n3" data-flow-edge-source-handle-value="n3-r" data-flow-edge-target-value="n1" data-flow-edge-target-handle-value="n1-l" data-flow-edge-type-value="bezier" data-flow-edge-marker-end-value="arrow" class="hf-edge" />
            <path data-controller="flow-connection-line" class="hf-connection-line" style="display:none" />
          </svg>
        </div>
      </div>

      <div data-flow-target="selectionBox" class="hf-selection-box"></div>

      <div class="hf-controls" data-controller="flow-toolbar" data-flow-toolbar-flow-outlet="#flow-canvas">
        <button data-action="click->flow-toolbar#zoomIn" class="hf-control-btn">+</button>
        <button data-flow-toolbar-target="zoomLevel" class="hf-control-btn hf-control-btn--zoom-level">100%</button>
        <button data-action="click->flow-toolbar#zoomOut" class="hf-control-btn">−</button>
        <button data-action="click->flow-toolbar#fitView" class="hf-control-btn">⊞</button>
      </div>
      <div data-controller="flow-minimap" data-flow-minimap-flow-outlet="#flow-canvas"></div>
    </div>
  </div>

  <script type="module">
    import { Application } from "@hotwired/stimulus"
    import { registerHotwireFlow } from "../src/index.js?v=9"
    const app = Application.start()
    registerHotwireFlow(app)
  </script>
</body>
</html>
